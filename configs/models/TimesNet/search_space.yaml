# TimesNet hyperparameter search space for Optuna HPO

search_space:
  d_model:
    type: categorical
    choices: [24, 32]  
  d_ff:
    type: categorical
    choices: [32, 64]  # FFN dimension for Inception blocks
  e_layers:
    type: int
    low: 2
    high: 3  # Number of TimesBlocks
  num_kernels:
    type: categorical
    choices: [3]  # Fixed to maintain parameter range
  top_k:
    type: categorical
    choices: [3, 5]  # Top K frequencies for period detection
  dropout:
    type: float
    low: 0.0
    high: 0.2
    step: 0.05
  learning_rate:
    type: loguniform
    low: 0.0005
    high: 0.005  
  batch_size:
    type: categorical
    choices: [64, 128]
