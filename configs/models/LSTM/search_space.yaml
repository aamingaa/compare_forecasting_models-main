# Hyperparameter search space for LSTM_Dense (Optuna)

search_space:
  hidden_size:
    type: categorical
    choices: [64, 128]

  num_layers:
    type: int
    low: 1
    high: 3

  mlp_hidden_size:
    type: categorical
    choices: [64,  128]

  bidirectional:
    type: categorical
    choices: [false , true]  # Enabled to allow exploration of bidirectional LSTM variants

  dropout:
    type: float
    low: 0.0
    high: 0.2
    step: 0.05

  learning_rate:
    type: loguniform
    low: 0.0005
    high: 0.005  

  batch_size:
    type: categorical
    choices: [64, 128]
