# Autoformer hyperparameter search space for Optuna HPO

search_space:
  moving_avg:
    type: categorical
    choices: [9]
  
  d_model:
    type: categorical
    choices: [ 64, 128]
  
  n_heads:
    type: categorical
    choices: [4, 8]
  
  e_layers:
    type: categorical
    choices: [1, 2]
  
  d_layers:
    type: categorical
    choices: [1, 2]
  
  d_ff:
    type: categorical
    choices: [ 64, 128]
  
  factor:
    type: categorical
    choices: [1, 3]
  
  dropout:
    type: float
    low: 0.00
    high: 0.2
    step: 0.05

  activation:
    type: categorical
    choices: ["gelu"]  
    
  embed:
    type: categorical
    choices: ["timeF"]

  learning_rate:
    type: loguniform
    low: 0.0005
    high: 0.005
  batch_size:
    type: categorical
    choices: [64, 128]