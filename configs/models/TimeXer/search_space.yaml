# TimeXer hyperparameter search space for Optuna HPO

search_space:
  d_model:
    type: categorical
    choices: [64, 96]
  patch_len:
    type: categorical
    choices: [4]  # Common divisors for window_size 24 and 96
  d_ff:
    type: categorical
    choices: [128, 256]
  e_layers:
    type: int
    low: 2
    high: 3
  n_heads:
    type: categorical
    choices: [4, 8]
  dropout:
    type: float
    low: 0.00
    high: 0.2
    step: 0.05
  factor:
    type: categorical
    choices: [1, 3]
  activation:
    type: categorical
    choices: [ "gelu"]
  use_norm:
    type: categorical
    choices: [True]
  target_idx:
    type: categorical
    choices: [3]  # Primarily Close price in OHLCV
  learning_rate:
    type: loguniform
    low: 0.0005
    high: 0.005  
  batch_size:
    type: categorical
    choices: [64, 128]
