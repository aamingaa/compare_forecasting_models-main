# PatchTSTCrossAsset hyperparameter search space

search_space:
  num_assets:
    type: categorical
    choices: [4]

  d_model:
    type: categorical
    choices: [64, 128]

  patch_len:
    type: categorical
    choices: [8, 16, 24]

  stride:
    type: categorical
    choices: [4, 8]

  n_heads:
    type: categorical
    choices: [2, 4, 8]

  time_layers:
    type: int
    low: 1
    high: 3

  asset_layers:
    type: int
    low: 1
    high: 2

  d_ff:
    type: categorical
    choices: [128, 256]

  dropout:
    type: float
    low: 0.0
    high: 0.2
    step: 0.05

  learning_rate:
    type: loguniform
    low: 0.0003
    high: 0.003

  batch_size:
    type: categorical
    choices: [32, 64, 128]
