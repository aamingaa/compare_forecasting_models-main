# Training configuration

# Default training hyperparameters
epochs: 100
batch_size: 128
learning_rate: 0.005
optimizer: adam
weight_decay: 0.0001

# Early stopping
early_stopping:
  enabled: true
  patience: 15
  min_delta: 0.0001
  monitor: val_loss

# Learning rate scheduler
scheduler:
  type: reduce_on_plateau  # reduce_on_plateau | cosine | step
  patience: 5
  factor: 0.5
  min_lr: 0.000001

# Loss function
loss: mse

# Gradient clipping
gradient_clip_norm: 1.0

# Gradient accumulation (effective_batch = batch_size * grad_accum_steps)
grad_accum_steps: 1

# --- GPU / Performance Optimization ---

# Mixed precision training (AMP) - auto-enabled on CUDA, no-op on CPU
use_amp: false

# TF32 for Ampere+ GPUs (~2-3x matmul throughput, negligible precision impact)
use_tf32: false

# torch.compile() graph optimization (requires PyTorch >= 2.0)
use_compile: false

# Deterministic mode (disables cuDNN benchmark + TF32 for exact reproducibility)
deterministic: false

# Multi-seed evaluation seeds
eval_seeds:
  - 123
  - 456
  - 789

# Checkpointing
checkpoint:
  save_best: true
  save_last: true
  resume: true  # resume from last checkpoint if available

# DataLoader settings
num_workers: 4
pin_memory: true
persistent_workers: false  # Disable persistent_workers on Windows due to multiprocessing cleanup issues
prefetch_factor: 2
